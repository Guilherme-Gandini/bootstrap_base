 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap da estilização -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap dos ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <!-- CSS customizado -->
     <link rel="stylesheet" href="style.css">
    <title>Document</title>
 </head>
 <body>
    <div class="container d-flex justify-content-center align-items-center">
        <form class="custom-form mt-3">
            <div class="col-sm-12 mb-3">
                <div class="input-group">
                    <span class="input-group-text custom-icon">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email" class="form-control custom-input" placeholder="email">
                </div>
            </div>
            <div class="col-sm-12 mb-3">
                <div class="input-group">
                    <span class="input-group-text custom-icon">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control custom-input" placeholder="senha">
                </div>
            </div>
            <button class="btn btn-primary custom-button">Enviar <i class="bi-arrow-right"></i></button>
        </form>
    </div>
 </body>
 </html>
