<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container">
        
        <div class="row">
            <div class="col-3 bg-primary">Coluna 1</div>
            <div class="col-3 bg-secondary">Coluna 2</div>
            <div class="col-3 bg-danger">Coluna 3</div>
            <div class="col-3 bg-info">Coluna 4</div>
        </div>

        <!-- Linha com 3 colunas -->
        <div class="row my-3">
            <div class="col-4 bg-primary">Coluna 1</div>
            <div class="col-4 bg-secondary">Coluna 2</div>
            <div class="col-4 bg-danger">Coluna 3</div>
        </div>

        <!-- Linha com 2 colunas -->
        <div class="row">
            <div class="col-6 bg-primary">Coluna 1</div>
            <div class="col-6 bg-secondary">Coluna 2</div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
