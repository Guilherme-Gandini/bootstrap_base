<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .carousel-inner img {
            margin: auto;
            max-height: 700px;
            /* Sugestão: limita a altura para não quebrar o layout */
            object-fit: cover;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                Navbar <i class="bi bi-bootstrap-fill text-light"></i>
            </a>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active text-light" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="#">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="#">Contatos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            <strong>Promoção Relâmpago!</strong> 20% de desconto hoje.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div id="carouselExemplo" class="carousel slide mt-3" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="Lazengan.jpg" class="d-block w-100" alt="Slide 1">
                </div>
                <div class="carousel-item">
                    <img src="Spiral.webp" class="d-block w-100" alt="Slide 2">
                </div>
                <div class="carousel-item">
                    <img src="STTGL.webp" class="d-block w-100" alt="Slide 3">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>

    <div class="container mt-5">
        <div class="p-4 bg-light text-center border rounded">
            <h5>Ganhar a Promoção</h5>
            <div class="progress mb-3" style="height: 25px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">
                    0%
                </div>
            </div>

            <div>
                <button class="btn btn-primary" id="increase-progress">Clique aqui!</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('increase-progress').addEventListener('click', function () {
            let progressBar = document.getElementById('progress-bar');
            let width = parseInt(progressBar.style.width);

            if (width < 100) {
                width += 20;
                progressBar.style.width = width + "%";
                progressBar.textContent = width + "%";

                if (width === 100) {
                    setTimeout(() => {
                        alert("Parabéns! Você desbloqueou um desconto especial!");
                    }, 200);
                }
            }
        });
    </script>

</body>

</html>
